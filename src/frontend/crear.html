<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Envío</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">📦 LogiTrack</h1>

  <nav>
    <a href="index.html">Listado de Envíos</a>
    <a class="active">Crear Envío</a>
  </nav>

  <div class="user">
    Usuario |
    <select id="rol">
      <option value="operador">Operador</option>
      <option value="supervisor">Supervisor</option>
    </select>
  </div>
</header>

<main class="container">

  <h2>Crear Nuevo Envío</h2>

  <form id="form-envio">

    <!-- INFO -->
    <div class="card-form">
      <h3>Información General</h3>
      <label>Remitente</label>
      <input type="text" id="remitente" required>

      <label>Destinatario</label>
      <input type="text" id="destinatario" required>
    </div>

    <!-- UBICACION -->
    <div class="card-form">
      <h3>Ubicación</h3>
      <label>Origen</label>
      <input type="text" id="ciudadOrigen" required>

      <label>Destino</label>
      <input type="text" id="ciudadDestino" required>
    </div>

    <!-- IA -->
    <div class="card-form">
      <h3>Datos del paquete</h3>

      <label>Distancia (km)</label>
      <input type="number" id="distancia_km" required>

      <label>Tipo de envío</label>
      <select id="tipo_envio">
        <option value="normal">Normal</option>
        <option value="express">Express</option>
      </select>

      <label>Ventana horaria</label>
      <select id="ventana_horaria">
        <option value="mañana">Mañana</option>
        <option value="tarde">Tarde</option>
        <option value="noche">Noche</option>
      </select>
      
      <label> Frágil<input type="checkbox" id="fragil"></label>
      <label> Requiere frío<input type="checkbox" id="frio"></label>

      <label>Saturación de ruta (0 a 1)</label>
      <input type="number" step="0.1" id="saturacion_ruta" required>
    </div>

    <button type="submit">Crear Envío</button>

  </form>

</main>

<script src="app.js"></script>
</body>
</html>
